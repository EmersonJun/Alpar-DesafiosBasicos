<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <title>Painel</title>
  </head>

  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">Meu Painel</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Projetos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contato</a>
            </li>

            <li class="nav-item ms-3">
              <button class="btn btn-primary position-relative">
                Notificações
                <span
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                >
                  3
                </span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-3">
      <div class="alert alert-success text-center">
        Bem-vindo ao seu painel, Emerson!
      </div>
    </div>

    <main class="flex-fill py-5">
      <div class="container">
        <div class="text-center mb-5">
          <h2 class="fw-bold">O que eu faço</h2>
          <p class="text-muted">Principais áreas de atuação</p>
        </div>

        <div class="row g-4">
          <div class="col-md-4">
            <div class="card h-100 shadow text-center p-3">
              <div class="card-body">
                <i class="bi bi-code-slash fs-1 text-primary"></i>
                <h5 class="card-title mt-3 fw-bold">Desenvolvimento Web</h5>
                <p class="card-text text-muted">
                  Criação de sites modernos e responsivos.
                </p>
                <button class="btn btn-outline-primary">Ver mais</button>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card h-100 shadow text-center p-3">
              <div class="card-body">
                <i class="bi bi-server fs-1 text-success"></i>
                <h5 class="card-title mt-3 fw-bold">Backend</h5>
                <p class="card-text text-muted">
                  APIs, banco de dados e lógica.
                </p>
                <button class="btn btn-outline-success">Ver mais</button>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card h-100 shadow text-center p-3">
              <div class="card-body">
                <i class="bi bi-lightbulb fs-1 text-warning"></i>
                <h5 class="card-title mt-3 fw-bold">Consultoria</h5>
                <p class="card-text text-muted">
                  Soluções digitais para empresas.
                </p>
                <button class="btn btn-outline-warning">Ver mais</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">© 2026 Emerson Junior</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
